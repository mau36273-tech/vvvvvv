name = "facemax-api"
main = "src/worker.js"
compatibility_date = "2026-05-15"

# Apple bundle identifier; the worker uses this to validate StoreKit JWS
# payloads on /api/apple-receipt-verify. Override via the dashboard if you
# change the bundle ID.
[vars]
APPLE_BUNDLE_ID = "ai.facemax.app"

# Premium subscription state (mirrors what RevenueCat webhooks set).
[[kv_namespaces]]
binding = "PREMIUM_KV"
id = "c2d93ef4414440988ba881feb8c0a81b"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put NAME` or the Cloudflare dashboard):
#
#   OPENROUTER_API_KEY      - OpenRouter API key (all AI flows: face report,
#                             face-check, food scan, glow plan).
#   APPLE_SHARED_SECRET     - StoreKit shared secret (optional)
#   REVENUECAT_WEBHOOK_AUTH - Bearer token RevenueCat sends on webhooks
# ---------------------------------------------------------------------------
